name: Build & Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: minakata
  NOMAD_JOB_FILE: job.nomad

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Update Nomad job image
        env:
          IMAGE_URI: ${{ steps.build.outputs.image_uri }}
        run: |
          sed -i "s|YOUR_ACCOUNT_ID.dkr.ecr.ap-northeast-1.amazonaws.com/minakata:latest|$IMAGE_URI|g" $NOMAD_JOB_FILE

      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          curl -fsSL https://releases.hashicorp.com/nomad/1.7.7/nomad_1.7.7_linux_amd64.zip -o nomad.zip
          unzip -q nomad.zip && sudo mv nomad /usr/local/bin/
          nomad job run $NOMAD_JOB_FILE
