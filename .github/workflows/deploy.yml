name: minakata - Build and Deploy

on:
  push:
    branches: [main]

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: minakata
  NOMAD_ADDR: ${{ secrets.NOMAD_ADDR }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI

          docker tag $IMAGE_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Install Nomad CLI
        run: |
          NOMAD_VERSION="1.8.4"
          curl -fsSL https://releases.hashicorp.com/nomad/${NOMAD_VERSION}/nomad_${NOMAD_VERSION}_linux_amd64.zip \
            -o nomad.zip
          unzip -o nomad.zip
          sudo mv nomad /usr/local/bin/

      - name: Render Nomad job spec
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          sed -i "s|\${DOCKER_IMAGE}|$IMAGE_URI|g" nomad/minakata.nomad.hcl

      - name: Deploy to Nomad
        run: |
          nomad job run nomad/minakata.nomad.hcl

      - name: Wait for deployment
        run: |
          nomad job status minakata